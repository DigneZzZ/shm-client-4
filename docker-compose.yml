services:
  shm-client:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    environment:
      # SHM API URL
      - SHM_URL=http://api
      # Optional: custom base path (e.g., /client)
      # - SHM_BASE_PATH=/
      # - TELEGRAM_BOT_NAME=your_bot
      # - TELEGRAM_BOT_AUTH_ENABLE=true
      # - SUPPORT_LINK=https://t.me/your_support_bot
    restart: unless-stopped
