name: Docker Push

on:
  workflow_dispatch:
    inputs:
      push_latest:
        description: 'Also tag as latest'
        type: boolean
        default: false
        required: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: image
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${REPO_LC}" >> $GITHUB_OUTPUT

      - name: Get version info
        id: version
        run: |
          TAG=${GITHUB_REF_NAME}
          REV=$(git rev-parse --short HEAD)
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "rev=${REV}" >> $GITHUB_OUTPUT
          echo "full=${TAG}-${REV}" >> $GITHUB_OUTPUT
          # Extract major.minor version (e.g., 1.2.5 -> 1.2)
          if [[ $TAG =~ ^([0-9]+\.[0-9]+)\. ]]; then
            echo "minor=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "minor=${TAG}" >> $GITHUB_OUTPUT
          fi
          # Check if current commit is on main branch (works in detached HEAD)
          IS_MASTER="false"
          if git branch -r --contains HEAD | grep -q 'origin/main'; then
            IS_MASTER="true"
            echo "Current commit is on main branch"
          else
            echo "Current commit is NOT on main branch"
          fi
          # Determine if we should push latest tag
          PUSH_LATEST="${{ github.event.inputs.push_latest }}"
          if [ "$PUSH_LATEST" = "true" ] || [ "$IS_MASTER" = "true" ]; then
            echo "push_latest=true" >> $GITHUB_OUTPUT
            echo "Will push 'latest' tag (master=${IS_MASTER}, manual=${PUSH_LATEST})"
          else
            echo "push_latest=false" >> $GITHUB_OUTPUT
            echo "Will NOT push 'latest' tag"
          fi

      - name: Create version.json
        run: |
          cat > public/version.json << EOF
          {
              "version": "${{ steps.version.outputs.full }}",
              "commitSha": "${{ github.sha }}"
          }
          EOF
          cat public/version.json

      - name: Build and push client image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          target: client
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.minor }}
            ${{ steps.version.outputs.push_latest == 'true' && format('{0}:latest', steps.image.outputs.name) || format('{0}:skip-latest-{1}', steps.image.outputs.name, steps.version.outputs.rev) }}
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client
